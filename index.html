<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancarlo - Simulador Bancario</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.293.0/lucide.min.js"></script>
    <style>
        :root {
            --bg-principal: #0b111e;
            --bg-tarjeta: #172237;
            --bg-input: #1f2d47;
            --texto-principal: #ffffff;
            --texto-secundario: #94a3b8;
            --color-acento: #3b82f6;
            --color-exito: #10b981;
            --color-error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor del Teléfono Mockup */
        .phone-container {
            width: 100%;
            max-width: 410px;
            height: 840px;
            background-color: var(--bg-principal);
            border: 8px solid #2d3748;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Barra de Estado */
        .status-bar {
            height: 40px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--texto-principal);
            font-weight: 500;
            z-index: 10;
        }

        /* App Header */
        .app-header {
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background-color: var(--color-acento);
            border-radius: 50%;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Contenido Principal */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            padding-bottom: 100px;
        }

        .main-content::-webkit-scrollbar {
            width: 0;
        }

        /* Tarjeta de Balance */
        .balance-card {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }

        .balance-label {
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .account-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #93c5fd;
        }

        /* Sección de Acciones Rápidas */
        .section-title {
            font-size: 16px;
            color: var(--texto-secundario);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .action-btn {
            background-color: var(--bg-tarjeta);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            color: var(--texto-principal);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            transition: background 0.2s;
        }

        .action-btn:active {
            background-color: var(--bg-input);
        }

        .action-icon {
            padding: 8px;
            border-radius: 12px;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--color-acento);
        }

        /* Historial de Transacciones */
        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tx-item {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tx-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tx-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background-color: var(--bg-input);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: var(--texto-secundario);
        }

        .tx-details .tx-concept {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .tx-details .tx-date {
            font-size: 12px;
            color: var(--texto-secundario);
        }

        .tx-amount {
            font-weight: 600;
            font-size: 15px;
        }

        .tx-amount.positive { color: var(--color-exito); }
        .tx-amount.negative { color: var(--texto-principal); }

        /* Ventanas Modales (Formularios / Verificación) */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(11, 17, 30, 0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-tarjeta);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 80%;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--texto-secundario);
            cursor: pointer;
        }

        /* Componentes de Formulario */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--texto-secundario);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 14px;
            color: var(--texto-principal);
            font-size: 16px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-acento);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--color-acento);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Pantalla de Verificación de Seguridad */
        .security-screen {
            text-align: center;
            padding: 20px 0;
        }

        .security-icon-box {
            width: 72px;
            height: 72px;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-acento);
            margin: 0 auto 16px auto;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Barra de Estado Inteligente -->
        <div class="status-bar">
            <span id="current-time">12:00</span>
            <div style="display: flex; gap: 6px; align-items: center;">
                <i data-lucide="wifi" style="width: 16px; height: 16px;"></i>
                <i data-lucide="battery" style="width: 16px; height: 16px;"></i>
            </div>
        </div>

        <!-- Encabezado de la App -->
        <div class="app-header">
            <div class="logo-area">
                <div class="logo-dot"></div>
                <span class="brand-name">Bancarlo</span>
            </div>
            <i data-lucide="bell" style="color: var(--texto-secundario); cursor: pointer;"></i>
        </div>

        <!-- Contenido de Cuentas y Movimientos -->
        <div class="main-content">
            <!-- Balance General -->
            <div class="balance-card">
                <p class="balance-label">Balance Total Disponible</p>
                <h1 class="balance-amount" id="balance-display">$0.00</h1>
                <div class="account-info">
                    <span>Cuenta de Débito</span>
                    <span>• • • • 4820</span>
                </div>
            </div>

            <!-- Acciones Rápidas -->
            <p class="section-title">Operaciones Rápidas</p>
            <div class="quick-actions">
                <button class="action-btn" onclick="openModal('modal-transferir')">
                    <div class="action-icon"><i data-lucide="send"></i></div>
                    <span style="font-weight: 600; font-size: 14px;">Transferir</span>
                </button>
                <button class="action-btn" onclick="openModal('modal-fondos')">
                    <div class="action-icon"><i data-lucide="plus-circle"></i></div>
                    <span style="font-weight: 600; font-size: 14px;">Añadir Fondos</span>
                </button>
            </div>

            <!-- Lista de Historial -->
            <p class="section-title">Actividad Reciente</p>
            <div class="tx-list" id="transactions-container">
                <!-- Se inyectan dinámicamente -->
            </div>
        </div>

        <!-- MODAL: TRANSFERIR -->
        <div class="modal-overlay" id="modal-transferir">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Nueva Transferencia</h3>
                    <button class="close-btn" onclick="closeModal('modal-transferir')"><i data-lucide="x"></i></button>
                </div>
                <div class="form-group">
                    <label>Nombre del Beneficiario</label>
                    <input type="text" id="tx-destinatario" class="form-input" placeholder="Ej. Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Monto a enviar ($)</label>
                    <input type="number" id="tx-monto" class="form-input" placeholder="0.00">
                </div>
                <button class="submit-btn" onclick="processTransferInit()">Continuar</button>
            </div>
        </div>

        <!-- MODAL: AÑADIR FONDOS -->
        <div class="modal-overlay" id="modal-fondos">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Simular Depósito</h3>
                    <button class="close-btn" onclick="closeModal('modal-fondos')"><i data-lucide="x"></i></button>
                </div>
                <div class="form-group">
                    <label>Monto del Depósito ($)</label>
                    <input type="number" id="deposito-monto" class="form-input" placeholder="0.00">
                </div>
                <button class="submit-btn" onclick="processDeposit()">Confirmar Depósito</button>
            </div>
        </div>

        <!-- MODAL: VERIFICACIÓN DE SEGURIDAD -->
        <div class="modal-overlay" id="modal-seguridad">
            <div class="modal-content" style="padding-bottom: 40px;">
                <div class="security-screen">
                    <div class="security-icon-box">
                        <i data-lucide="shield-check" style="width: 36px; height: 36px;"></i>
                    </div>
                    <h3 style="margin-bottom: 8px; font-size: 20px;">Verificación de Seguridad</h3>
                    <p style="color: var(--texto-secundario); font-size: 14px; margin-bottom: 24px;">
                        Por favor, confirma tu identidad autorizando la transacción saliente.
                    </p>
                    <button class="submit-btn" id="confirm-security-btn">Autorizar con Huella / PIN</button>
                    <button class="close-btn" style="margin-top: 16px; font-weight: 500;" onclick="closeModal('modal-seguridad')">Cancelar Operación</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Inicialización de Variables de Estado Local
        let accountData = JSON.parse(localStorage.getItem('bancarlo_data')) || {
            balance: 5000.00,
            transactions: [
                { id: 1, type: 'deposit', conceptual: 'Depósito Inicial', amount: 5000.00, date: 'Hoy' }
            ]
        };

        // Renderizar datos actualizados en la pantalla principal
        function updateUI() {
            document.getElementById('balance-display').innerText = `$${accountData.balance.toFixed(2)}`;
            
            const container = document.getElementById('transactions-container');
            container.innerHTML = '';

            if (accountData.transactions.length === 0) {
                container.innerHTML = `<p style="color: var(--texto-secundario); text-align: center; font-size: 14px; padding: 20px;">Sin movimientos recientes</p>`;
                return;
            }

            // Renderizar de más nuevo a más viejo
            [...accountData.transactions].reverse().forEach(tx => {
                const initials = tx.conceptual.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const isDeposit = tx.type === 'deposit';
                
                const txHTML = `
                    <div class="tx-item">
                        <div class="tx-info">
                            <div class="tx-avatar">${initials}</div>
                            <div class="tx-details">
                                <p class="tx-concept">${tx.conceptual}</p>
                                <p class="tx-date">${tx.date}</p>
                            </div>
                        </div>
                        <span class="tx-amount ${isDeposit ? 'positive' : 'negative'}">
                            ${isDeposit ? '+' : '-'}$${tx.amount.toFixed(2)}
                        </span>
                    </div>
                `;
                container.innerHTML += txHTML;
            });
            
            localStorage.setItem('bancarlo_data', JSON.stringify(accountData));
        }

        // Control de Apertura de Ventanas Modales
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Lógica: Iniciar Transferencia -> Pasa por Ventana de Seguridad
        let pendingTransfer = null;

        function processTransferInit() {
            const dest = document.getElementById('tx-destinatario').value.trim();
            const amount = parseFloat(document.getElementById('tx-monto').value);

            if (!dest || isNaN(amount) || amount <= 0) {
                alert('Por favor, ingresa datos válidos.');
                return;
            }

            if (amount > accountData.balance) {
                alert('Fondos insuficientes para realizar esta simulación.');
                return;
            }

            // Almacenar temporalmente los datos para el paso de verificación
            pendingTransfer = { dest, amount };
            
            closeModal('modal-transferir');
            openModal('modal-seguridad');
        }

        // Confirmación final en la pantalla de verificación
        document.getElementById('confirm-security-btn').addEventListener('click', () => {
            if (pendingTransfer) {
                accountData.balance -= pendingTransfer.amount;
                accountData.transactions.push({
                    id: Date.now(),
                    type: 'transfer',
                    conceptual: `Transf. a ${pendingTransfer.dest}`,
                    amount: pendingTransfer.amount,
                    date: 'Hoy'
                });

                // Limpiar entradas
                document.getElementById('tx-destinatario').value = '';
                document.getElementById('tx-monto').value = '';
                pendingTransfer = null;

                updateUI();
                closeModal('modal-seguridad');
            }
        });

        // Lógica: Añadir Fondos
        function processDeposit() {
            const amount = parseFloat(document.getElementById('deposito-monto').value);

            if (isNaN(amount) || amount <= 0) {
                alert('Monto inválido.');
                return;
            }

            accountData.balance += amount;
            accountData.transactions.push({
                id: Date.now(),
                type: 'deposit',
                conceptual: 'Depósito Simulado',
                amount: amount,
                date: 'Hoy'
            });

            document.getElementById('deposito-monto').value = '';
            updateUI();
            closeModal('modal-fondos');
        }

        // Reloj Dinámico superior de la barra de estado
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hours}:${minutes}`;
        }

        // Inicializar Iconos y UI
        setInterval(updateClock, 1000);
        updateClock();
        updateUI();
        lucide.createIcons();
    </script>
</body>
</html>
